<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <title>Alex Johnson | Contact Page</title>

        <!-- Link to own css file -->
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <body>
        <header>
            <h1> Alex Johnson | Contact Page</h1>
            <p class="tagline">Beginner Web Developmnet Student</p>
            <nav>
                <!-- a anchor is used to add links on your page -->
                <!-- href attribute - link / URL  -->
                <!-- target attribute will control whether or not you want to
                   open your page in a different tab -->
                <a href="index.html"> Home </a>
                <!-- <a href="#" target="_blank"> About</a> -->
                <a href="about.html"> About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
            </nav>
        </header>

        <main>
            <article>
                <section class="card">
                    <h2>Contact Form</h2>
                    <form action="">
                        <fieldset>
                            <legend>Your Information</legend>
                            <!-- Full Name field -->
                            <label for="full-name">Full Name</label>
                            <input type="text" name="full-name" placeholder="Enter your full name here">

                            <label for="email">Email Address</label>
                            <input type="text" name="email" placeholder="example@example.com">

                            <label for="reason">Reason for Contact</label>
                            <select name="reason" id="reason">
                                <option value="">Select One</option>
                                <option value="project">Project Question</option>
                                <option value="feedback"> Website Feedback</option>
                                <option value="other">Other</option>
                            </select>
                        </fieldset>

                        <fieldset>
                            <legend>Your Message</legend>

                            <label for="message">Message</label>
                            <textarea name="message" id="message" rows="6" placeholder="Write Your message here"></textarea>

                            <label for="contact-method">Preferred contact method:</label>

                            <input type="radio" name="contact-method" id="contact-email">
                            <label for="contact-email">Email</label>

                            <input type="radio" name="contact-method" id="contact-phone">
                            <label for="contact-phone">Phone</label>

                            <input type="checkbox" name="updates">
                            <label for="updates">I would like to receive updates.</label>
                        </fieldset>

                        <button type="submit">Send Message</button>
                    </form>
                </section>
            </article>

            <aside>
                <h2>Contact Details</h2>
                <p>Email: <a href="mailto:alex.johnson@example.com">alex.johnson@example.com</a></p>
            </aside>
        </main>

        <footer>
            <h2>Contact me</h2>
            <p>Email: <a href="mailto:alex.johnson@example.com"> alex.johnson@example.com </a></p>
            <p> &copy;   2026 Alex Johnson. All rights reserved.</p>
            <!-- &#169; - same for copy symbol 
                &EntityCode;
                &#code 
                $dollar;  $cent;
            -->
        </footer>
    </body>
</html>
